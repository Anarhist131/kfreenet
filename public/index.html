<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Криста 3.0 (Мессенджер)</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Экран авторизации -->
  <div id="authOverlay" class="modal">
    <div class="modal-content glass-card">
      <h1>Криста 3.0</h1>
      <div class="auth-tabs">
        <button id="tabLogin" class="tab active">Вход</button>
        <button id="tabRegister" class="tab">Регистрация</button>
      </div>
      <form id="authForm">
        <input type="text" id="authLogin" placeholder="Логин" required autocomplete="username">
        <input type="password" id="authPassword" placeholder="Пароль" required autocomplete="current-password">
        <div id="registerNickField" class="hidden">
          <input type="text" id="authNick" placeholder="Никнейм (необязательно)">
        </div>
        <button type="submit" id="authSubmit" class="glass-btn">Войти</button>
      </form>
      <div id="authError" class="error"></div>
    </div>
  </div>

  <!-- Основной интерфейс (скрыт до авторизации) -->
  <div id="mainApp" class="hidden">
    <!-- Верхняя панель -->
    <header class="top-bar glass-panel">
      <div class="logo">Криста 3.0</div>
      <nav class="top-actions">
        <button id="btnCreateRoom" class="glass-btn">Создать чат</button>
        <button id="btnFind" class="glass-btn">Найти чат</button>
        <button id="btnDownload" class="glass-btn">Скачать txt</button>
        <button id="btnSettings" class="glass-btn">Настройки</button>
        <button id="btnList" class="glass-btn">Список чатов</button>
      </nav>
    </header>

    <main class="main-container">
      <!-- Область чата -->
      <section class="chat-area">
        <div class="chat-header glass-panel" id="chatHeader">
          <span id="chatTitle">Общий чат</span>
          <span id="chatIdDisplay" class="chat-id">[general]</span>
        </div>
        <div class="messages-container glass-scroll" id="messagesContainer">
          <!-- Поиск по истории (скрыт) -->
          <div class="search-bar hidden" id="searchBar">
            <input type="text" id="searchInput" placeholder="Поиск в чате...">
            <button id="searchPrev" class="glass-btn-sm">↑</button>
            <button id="searchNext" class="glass-btn-sm">↓</button>
            <button id="closeSearch" class="glass-btn-sm">✕</button>
          </div>
          <!-- Сообщения будут здесь -->
        </div>
        <!-- Индикатор печати -->
        <div class="typing-indicator hidden" id="typingIndicator">Печатает...</div>
        <!-- Поле ввода -->
        <div class="input-area glass-panel">
          <button id="emojiBtn" class="glass-btn-sm">😊</button>
          <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
          <button id="btnSend" class="glass-btn">Отправить</button>
        </div>
        <!-- Панель эмодзи -->
        <div class="emoji-picker hidden" id="emojiPicker"></div>
      </section>

      <!-- Панель участников -->
      <aside class="participants-panel glass-panel" id="participantsPanel">
        <h3>Участники</h3>
        <ul id="participantsList"></ul>
        <div class="sub-btn-container" id="subBtnContainer"></div>
      </aside>
    </main>

    <!-- Контекстное меню сообщения -->
    <div class="context-menu hidden" id="contextMenu">
      <button data-action="reply">Ответить</button>
      <button data-action="edit">Редактировать</button>
      <button data-action="delete">Удалить</button>
      <button data-action="react">Реакции</button>
      <button data-action="copy">Копировать</button>
    </div>

    <!-- Панель реакций -->
    <div class="reaction-picker hidden" id="reactionPicker">
      <span class="reaction-emoji">👍</span>
      <span class="reaction-emoji">❤️</span>
      <span class="reaction-emoji">😂</span>
      <span class="reaction-emoji">😮</span>
      <span class="reaction-emoji">😢</span>
      <span class="reaction-emoji">😡</span>
    </div>

    <!-- Модальные окна -->
    <!-- Создать чат -->
    <div class="modal hidden" id="modalCreateRoom">
      <div class="modal-content glass-card">
        <h2>Создать новый чат</h2>
        <input type="text" id="inputRoomName" placeholder="Название чата">
        <div class="modal-actions">
          <button id="btnCreateRoomSubmit" class="glass-btn">Создать</button>
          <button class="modal-close glass-btn" data-modal="modalCreateRoom">Отмена</button>
        </div>
      </div>
    </div>

    <!-- Найти чат / пользователя -->
    <div class="modal hidden" id="modalFind">
      <div class="modal-content glass-card">
        <h2>Найти чат или пользователя</h2>
        <input type="text" id="inputFindId" placeholder="Введите ID">
        <button id="btnFindSubmit" class="glass-btn">Найти</button>
        <div class="recent-searches">
          <h4>Последние поиски</h4>
          <ul id="recentSearchesList"></ul>
        </div>
        <button class="modal-close glass-btn" data-modal="modalFind">Закрыть</button>
      </div>
    </div>

    <!-- Настройки -->
    <div class="modal hidden" id="modalSettings">
      <div class="modal-content glass-card">
        <h2>Настройки аккаунта</h2>
        <div class="field"><label>Ваш ID: <strong id="displayUserId"></strong></label></div>
        <div class="field"><label>Никнейм: <input type="text" id="inputNickname"></label></div>
        <div class="field"><label>Описание: <input type="text" id="inputDescription"></label></div>
        <div class="field">
          <label>Цвет ника:</label>
          <div class="color-palette" id="colorPalette"></div>
        </div>
        <div class="field">
          <label>Аватар:</label>
          <input type="file" id="avatarFile" accept="image/*">
          <img id="avatarPreview" class="avatar-preview" src="" alt="Аватар">
        </div>
        <div class="field">
          <label>Фон:</label>
          <input type="file" id="bgFile" accept="image/*">
        </div>
        <div class="field">
          <label>Тема:</label>
          <select id="themeSelect">
            <option value="dark">Тёмная</option>
            <option value="light">Светлая</option>
          </select>
        </div>
        <div class="modal-actions">
          <button id="btnSaveProfile" class="glass-btn">Сохранить</button>
          <button class="modal-close glass-btn" data-modal="modalSettings">Закрыть</button>
        </div>
      </div>
    </div>

    <!-- Список чатов и контактов -->
    <div class="modal hidden" id="modalList">
      <div class="modal-content glass-card">
        <h2>Ваши чаты и контакты</h2>
        <div class="tabs">
          <button class="tab active" data-tab="roomsTab">Чаты</button>
          <button class="tab" data-tab="contactsTab">Юзеры</button>
        </div>
        <div class="tab-content" id="roomsTab"><ul id="roomsList"></ul></div>
        <div class="tab-content hidden" id="contactsTab"><ul id="contactsList"></ul></div>
        <button class="modal-close glass-btn" data-modal="modalList">Закрыть</button>
      </div>
    </div>

    <!-- Профиль пользователя -->
    <div class="modal hidden" id="modalProfile">
      <div class="modal-content glass-card">
        <div class="profile-view" id="profileContent"></div>
        <button class="modal-close glass-btn" data-modal="modalProfile">Закрыть</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
            </html>
